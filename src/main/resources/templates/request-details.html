<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Request Details</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 24px;
            background: #121212;
            color: #e6e6e6;
        }

        h1, h2, h3 {
            margin-bottom: 12px;
            color: #ffffff;
        }

        .card {
            background: #1b1b1b;
            border: 1px solid #2d2d2d;
            padding: 16px;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #1b1b1b;
            border: 1px solid #2d2d2d;
        }

        th, td {
            border: 1px solid #2d2d2d;
            padding: 10px;
            text-align: left;
            vertical-align: top;
        }

        th {
            background: #232323;
            color: #ffffff;
        }

        pre {
            white-space: pre-wrap;
            word-break: break-word;
            background: #101010;
            color: #e6e6e6;
            border: 1px solid #2d2d2d;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
        }

        a {
            color: #64b5f6;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        form {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        input[type="text"],
        input[type="number"] {
            padding: 8px;
            min-width: 160px;
            background: #181818;
            color: #e6e6e6;
            border: 1px solid #333333;
            border-radius: 6px;
        }

        button {
            padding: 8px 12px;
            border: 1px solid #3a3a3a;
            background: #242424;
            color: #e6e6e6;
            cursor: pointer;
            text-decoration: none;
            border-radius: 6px;
        }

        button:hover {
            background: #2e2e2e;
        }
    </style>
</head>
<body>

<p><a href="/ui/requests">← Back to list</a></p>

<h1>Request Details</h1>

<div class="card">
    <p><strong>ID:</strong> <span th:text="${requestItem.id}"></span></p>
    <p><strong>Received At:</strong> <span th:text="${requestItem.receivedAt}"></span></p>
    <p><strong>Source Type:</strong> <span th:text="${requestItem.sourceType}"></span></p>
    <p><strong>Group:</strong> <span th:text="${requestItem.groupName}"></span></p>
    <p><strong>Method:</strong> <span th:text="${requestItem.method}"></span></p>
    <p><strong>Path:</strong> <span th:text="${requestItem.path}"></span></p>
    <p><strong>Content Type:</strong> <span th:text="${requestItem.contentType}"></span></p>
    <p><strong>Content Type Category:</strong> <span th:text="${requestItem.contentTypeCategory}"></span></p>
</div>

<h2>Headers</h2>
<table>
    <thead>
    <tr>
        <th>Name</th>
        <th>Value</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="header : ${requestItem.headers}">
        <td th:text="${header.headerName}"></td>
        <td th:text="${header.headerValue}"></td>
    </tr>
    </tbody>
</table>

<h2>Query Params</h2>
<table>
    <thead>
    <tr>
        <th>Name</th>
        <th>Value</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="qp : ${requestItem.queryParams}">
        <td th:text="${qp.paramName}"></td>
        <td th:text="${qp.paramValue}"></td>
    </tr>
    </tbody>
</table>

<h2>Body Fields</h2>
<table>
    <thead>
    <tr>
        <th>Field Path</th>
        <th>Field Value</th>
        <th>Value Type</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="field : ${requestItem.bodyFields}">
        <td th:text="${field.fieldPath}"></td>
        <td th:text="${field.fieldValue}"></td>
        <td th:text="${field.valueType}"></td>
    </tr>
    </tbody>
</table>

<h2>Raw Body</h2>
<pre th:text="${requestItem.bodyRaw}"></pre>

<h2>Normalized Structure JSON</h2>
<pre th:text="${requestItem.normalizedStructureJson}"></pre>

</body>
</html>
