<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Error</title>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      background: #121212;
      color: #e6e6e6;
    }

    h1, h2, h3 {
      margin-bottom: 12px;
      color: #ffffff;
    }

    .card {
      background: #1b1b1b;
      border: 1px solid #2d2d2d;
      padding: 16px;
      margin-bottom: 20px;
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1b1b1b;
      border: 1px solid #2d2d2d;
    }

    th, td {
      border: 1px solid #2d2d2d;
      padding: 10px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #232323;
      color: #ffffff;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #101010;
      color: #e6e6e6;
      border: 1px solid #2d2d2d;
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
    }

    a {
      color: #64b5f6;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    form {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    input[type="text"],
    input[type="number"] {
      padding: 8px;
      min-width: 160px;
      background: #181818;
      color: #e6e6e6;
      border: 1px solid #333333;
      border-radius: 6px;
    }

    button {
      padding: 8px 12px;
      border: 1px solid #3a3a3a;
      background: #242424;
      color: #e6e6e6;
      cursor: pointer;
      text-decoration: none;
      border-radius: 6px;
    }

    button:hover {
      background: #2e2e2e;
    }
  </style>
</head>
<body>
<div class="card">
  <h1 th:text="${error}">Error</h1>
  <p><strong>Status:</strong> <span th:text="${status}">500</span></p>
  <p><strong>Message:</strong> <span th:text="${message}">Something went wrong.</span></p>
  <p><strong>Path:</strong> <span th:text="${path}">/unknown</span></p>

  <div class="meta">
    <a href="/ui/requests">Back to requests</a>
  </div>
</div>
</body>
</html>
